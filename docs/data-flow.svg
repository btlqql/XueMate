<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="108%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="900" fill="#f8fafc" rx="0"/>

  <!-- 标题区 -->
  <rect x="0" y="0" width="900" height="55" fill="#1e293b"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="white">XueMate · SVG 动画讲解 · 完整数据流</text>

  <!-- ═══════════ STEP 1: 用户输入 ═══════════ -->
  <g data-step="1">
    <rect x="320" y="75" width="260" height="58" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
    <text x="450" y="97" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">1. 用户输入</text>
    <text x="450" y="117" text-anchor="middle" font-size="11" fill="#4ade80" font-style="italic">"帮我解释一下冒泡排序"</text>

    <!-- 标注 -->
    <rect x="610" y="78" width="180" height="52" rx="8" fill="white" stroke="#e2e8f0"/>
    <text x="620" y="96" font-size="10" font-weight="600" fill="#64748b">ChatView.vue</text>
    <text x="620" y="112" font-size="9" fill="#94a3b8">sendMessage(text)</text>
    <text x="620" y="124" font-size="9" fill="#94a3b8">用户消息立即 push 到 messages[]</text>
    <line x1="580" y1="104" x2="610" y2="104" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3"/>
  </g>

  <!-- 箭头 -->
  <line data-step="2" x1="450" y1="133" x2="450" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text data-step="2" x="460" y="150" font-size="9" fill="#94a3b8">IPC invoke</text>

  <!-- ═══════════ STEP 2: IPC 路由 ═══════════ -->
  <g data-step="2">
    <rect x="280" y="165" width="340" height="70" rx="14" fill="#fefce8" stroke="#eab308" stroke-width="2" filter="url(#sh)"/>
    <text x="450" y="187" text-anchor="middle" font-size="14" font-weight="700" fill="#854d0e">2. IPC 路由层</text>
    <text x="450" y="207" text-anchor="middle" font-size="11" fill="#ca8a04">index.ts → ipcMain.handle('chat:sendMessage')</text>
    <text x="450" y="223" text-anchor="middle" font-size="10" fill="#fbbf24">① RAG 检索 → ② 构建 systemPrompt → ③ 调 LLM → ④ 存消息</text>

    <!-- RAG 检索子流程 -->
    <rect x="50" y="165" width="200" height="70" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
    <text x="150" y="187" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">RAG 检索</text>
    <text x="150" y="203" font-size="9" fill="#fb923c">rag.ts → retrieve(query)</text>
    <text x="150" y="217" font-size="9" fill="#fb923c">cosineSimilarity → top-3 chunks</text>
    <line x1="250" y1="200" x2="280" y2="200" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- 箭头 -->
  <line data-step="3" x1="450" y1="235" x2="450" y2="265" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text data-step="3" x="460" y="254" font-size="9" fill="#94a3b8">systemPrompt + ragContext</text>

  <!-- ═══════════ STEP 3: 提示词构建 ═══════════ -->
  <g data-step="3">
    <rect x="180" y="270" width="540" height="95" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>
    <text x="450" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">3. 系统提示词构建</text>

    <!-- 提示词组成 -->
    <rect x="200" y="302" width="155" height="52" rx="6" fill="white" stroke="#93c5fd"/>
    <text x="277" y="318" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">memory.ts</text>
    <text x="277" y="332" text-anchor="middle" font-size="9" fill="#60a5fa">buildSystemPrompt()</text>
    <text x="277" y="346" text-anchor="middle" font-size="9" fill="#60a5fa">用户画像 + SVG指令</text>

    <rect x="370" y="302" width="155" height="52" rx="6" fill="white" stroke="#93c5fd"/>
    <text x="447" y="318" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">rag.ts</text>
    <text x="447" y="332" text-anchor="middle" font-size="9" fill="#60a5fa">retrieve() 结果</text>
    <text x="447" y="346" text-anchor="middle" font-size="9" fill="#60a5fa">课程资料上下文</text>

    <rect x="540" y="302" width="155" height="52" rx="6" fill="white" stroke="#93c5fd"/>
    <text x="617" y="318" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">chatStore.ts</text>
    <text x="617" y="332" text-anchor="middle" font-size="9" fill="#60a5fa">getConversation()</text>
    <text x="617" y="346" text-anchor="middle" font-size="9" fill="#60a5fa">最近 20 条历史</text>
  </g>

  <!-- 箭头 -->
  <line data-step="4" x1="450" y1="365" x2="450" y2="395" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text data-step="4" x="460" y="384" font-size="9" fill="#94a3b8">messages[] 完整请求</text>

  <!-- ═══════════ STEP 4: LLM 调用 ═══════════ -->
  <g data-step="4">
    <rect x="250" y="400" width="400" height="80" rx="14" fill="#fdf2f8" stroke="#ec4899" stroke-width="2" filter="url(#sh)"/>
    <text x="450" y="422" text-anchor="middle" font-size="14" font-weight="700" fill="#9d174d">4. LLM API 调用</text>
    <text x="450" y="442" text-anchor="middle" font-size="11" fill="#f472b6">llm.ts → chat({ messages, temperature, maxTokens })</text>
    <text x="450" y="460" text-anchor="middle" font-size="10" fill="#f9a8d4">POST → DeepSeek API → timeout 30s → retry 429/503</text>
    <text x="450" y="474" text-anchor="middle" font-size="9" fill="#fbcfe8">AbortController 超时 · 友好错误映射 · 2 次重试</text>
  </g>

  <!-- 箭头 -->
  <line data-step="5" x1="450" y1="480" x2="450" y2="510" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text data-step="5" x="460" y="499" font-size="9" fill="#94a3b8">LLM 返回文本流</text>

  <!-- ═══════════ STEP 5: LLM 返回内容 ═══════════ -->
  <g data-step="5">
    <rect x="80" y="515" width="740" height="90" rx="14" fill="#faf5ff" stroke="#a855f7" stroke-width="2" filter="url(#sh)"/>
    <text x="450" y="537" text-anchor="middle" font-size="14" font-weight="700" fill="#6b21a8">5. LLM 返回内容</text>

    <!-- 文本部分 -->
    <rect x="100" y="548" width="320" height="46" rx="8" fill="white" stroke="#d8b4fe"/>
    <text x="110" y="565" font-size="10" font-weight="600" fill="#7c3aed">文本段</text>
    <text x="110" y="581" font-size="9" fill="#a78bfa">"冒泡排序是一种简单的排序算法，</text>
    <text x="110" y="591" font-size="9" fill="#a78bfa">它重复地比较相邻元素..."</text>

    <!-- SVG 部分 -->
    <rect x="440" y="548" width="360" height="46" rx="8" fill="white" stroke="#d8b4fe"/>
    <text x="450" y="565" font-size="10" font-weight="600" fill="#7c3aed">SVG 段 ```svg ... ```</text>
    <text x="450" y="581" font-size="9" fill="#a78bfa">&lt;svg viewBox="0 0 400 200"&gt;</text>
    <text x="450" y="591" font-size="9" fill="#a78bfa">  &lt;rect data-step="0" .../&gt; &lt;rect data-step="1" .../&gt;</text>
  </g>

  <!-- 箭头 -->
  <line data-step="6" x1="450" y1="605" x2="450" y2="635" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text data-step="6" x="460" y="624" font-size="9" fill="#94a3b8">msg.content 完整文本</text>

  <!-- ═══════════ STEP 6: 前端拆分 ═══════════ -->
  <g data-step="6">
    <rect x="200" y="640" width="500" height="80" rx="14" fill="#ecfdf5" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
    <text x="450" y="662" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">6. ChatMessages.vue — 消息拆分</text>

    <rect x="220" y="674" width="200" height="36" rx="6" fill="white" stroke="#86efac"/>
    <text x="320" y="693" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">hasSvgBlock(text)</text>
    <text x="320" y="705" text-anchor="middle" font-size="9" fill="#4ade80">正则 /```svg([\s\S]*?)```/g</text>

    <rect x="440" y="674" width="240" height="36" rx="6" fill="white" stroke="#86efac"/>
    <text x="560" y="693" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">splitMessage(text)</text>
    <text x="560" y="705" text-anchor="middle" font-size="9" fill="#4ade80">→ [{type:'text'}, {type:'svg'}] 分段数组</text>
  </g>

  <!-- 箭头分叉 -->
  <line data-step="7" x1="350" y1="720" x2="250" y2="755" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-g)"/>
  <line data-step="7" x1="550" y1="720" x2="650" y2="755" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-b)"/>
  <text data-step="7" x="290" y="740" font-size="9" fill="#22c55e">text 段</text>
  <text data-step="7" x="600" y="740" font-size="9" fill="#3b82f6">svg 段</text>

  <!-- ═══════════ STEP 7: 渲染 ═══════════ -->
  <g data-step="7">
    <!-- Markdown 渲染 -->
    <rect x="80" y="760" width="300" height="55" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
    <text x="230" y="782" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Markdown 渲染</text>
    <text x="230" y="800" text-anchor="middle" font-size="10" fill="#4ade80">marked.parse(text) → v-html</text>
    <text x="230" y="810" text-anchor="middle" font-size="9" fill="#86efac">标题/列表/代码块/表格</text>

    <!-- SVG 动画渲染 -->
    <rect x="520" y="760" width="300" height="55" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>
    <text x="670" y="782" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">SvgAnimator.vue</text>
    <text x="670" y="800" text-anchor="middle" font-size="10" fill="#60a5fa">renderSvg() → parseSteps() → 播放控制</text>
    <text x="670" y="810" text-anchor="middle" font-size="9" fill="#93c5fd">innerHTML + CSS opacity + data-step</text>
  </g>

  <!-- 箭头汇合 -->
  <line data-step="8" x1="230" y1="815" x2="400" y2="850" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line data-step="8" x1="670" y1="815" x2="500" y2="850" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══════════ STEP 8: 最终渲染 ═══════════ -->
  <g data-step="8">
    <rect x="300" y="850" width="300" height="40" rx="14" fill="#1e293b" filter="url(#sh)"/>
    <text x="450" y="875" text-anchor="middle" font-size="14" font-weight="700" fill="white">8. 浏览器最终渲染</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(720, 75)">
    <rect x="0" y="0" width="150" height="120" rx="8" fill="white" stroke="#e2e8f0"/>
    <text x="10" y="18" font-size="10" font-weight="600" fill="#64748b">图例</text>
    <rect x="10" y="28" width="12" height="12" rx="3" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="28" y="38" font-size="9" fill="#64748b">前端 (Renderer)</text>
    <rect x="10" y="48" width="12" height="12" rx="3" fill="#fefce8" stroke="#eab308"/>
    <text x="28" y="58" font-size="9" fill="#64748b">IPC 层 (Main)</text>
    <rect x="10" y="68" width="12" height="12" rx="3" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="28" y="78" font-size="9" fill="#64748b">提示词构建</text>
    <rect x="10" y="88" width="12" height="12" rx="3" fill="#fdf2f8" stroke="#ec4899"/>
    <text x="28" y="98" font-size="9" fill="#64748b">LLM API</text>
    <rect x="10" y="108" width="12" height="12" rx="3" fill="#faf5ff" stroke="#a855f7"/>
    <text x="28" y="118" font-size="9" fill="#64748b">AI 返回内容</text>
  </g>

</svg>
