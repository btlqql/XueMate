services:
  gateway:
    environment:
      CRAWL4AI_ENABLED: "true"
      CRAWL4AI_URL: http://crawl4ai:11235
      CRAWL4AI_API_TOKEN: xuemate-crawl4ai-dev-token
    depends_on:
      - searxng
      - crawl4ai

  crawl4ai:
    image: unclecode/crawl4ai:basic-amd64
    container_name: xuemate-crawl4ai
    ports:
      - "11235:11235"
    environment:
      CRAWL4AI_API_TOKEN: xuemate-crawl4ai-dev-token
      CRAWL4AI_HOOKS_ENABLED: "false"
    volumes:
      - /dev/shm:/dev/shm
    shm_size: 1gb
    restart: unless-stopped
