name: xuemate-cloud

services:
  gateway:
    image: node:25-alpine
    container_name: xuemate-cloud-gateway
    working_dir: /app
    command: ["node", "server.mjs"]
    ports:
      - "8787:8787"
    environment:
      XUEMATE_CLOUD_HOST: 0.0.0.0
      XUEMATE_CLOUD_PORT: 8787
      XUEMATE_CLOUD_FAST_MODE: "true"
      XUEMATE_CLOUD_SEARXNG_TIMEOUT_MS: 2500
      XUEMATE_CLOUD_DIRECT_SEARCH_TIMEOUT_MS: 3500
      XUEMATE_CLOUD_CRAWL4AI_TIMEOUT_MS: 4000
      XUEMATE_CLOUD_PAGE_FETCH_CONCURRENCY: 4
      XUEMATE_CLOUD_CACHE_MAX_ENTRIES: 250
      XUEMATE_CLOUD_TASK_MAX_ENTRIES: 300
      SEARXNG_URL: http://searxng:8080
      CRAWL4AI_ENABLED: "false"
    volumes:
      - ./gateway/server.mjs:/app/server.mjs:ro
    depends_on:
      - searxng
    restart: unless-stopped

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: xuemate-searxng
    ports:
      - "8080:8080"
    environment:
      SEARXNG_BIND_ADDRESS: 0.0.0.0
      SEARXNG_PORT: 8080
      SEARXNG_SECRET: xuemate-dev-secret-change-before-public-deploy
      SEARXNG_LIMITER: "false"
      SEARXNG_PUBLIC_INSTANCE: "false"
    volumes:
      - ./config/searxng:/etc/searxng:rw
      - searxng-data:/var/cache/searxng
    depends_on:
      - searxng-valkey
    restart: unless-stopped

  searxng-valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: xuemate-searxng-valkey
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - searxng-valkey-data:/data
    restart: unless-stopped

volumes:
  searxng-data:
  searxng-valkey-data:
