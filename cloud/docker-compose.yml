name: xuemate-cloud

services:
  gateway:
    image: node:25-alpine
    container_name: xuemate-cloud-gateway
    working_dir: /app
    command: ["node", "server.mjs"]
    ports:
      - "8787:8787"
    environment:
      XUEMATE_CLOUD_HOST: 0.0.0.0
      XUEMATE_CLOUD_PORT: 8787
      SEARXNG_URL: http://searxng:8080
      CRAWL4AI_URL: http://crawl4ai:11235
    volumes:
      - ./gateway/server.mjs:/app/server.mjs:ro
    depends_on:
      - searxng
      - crawl4ai
    restart: unless-stopped

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: xuemate-searxng
    ports:
      - "8080:8080"
    environment:
      SEARXNG_BIND_ADDRESS: 0.0.0.0
      SEARXNG_PORT: 8080
      SEARXNG_SECRET: xuemate-dev-secret-change-before-public-deploy
      SEARXNG_LIMITER: "false"
      SEARXNG_PUBLIC_INSTANCE: "false"
    volumes:
      - ./config/searxng:/etc/searxng:rw
      - searxng-data:/var/cache/searxng
    depends_on:
      - searxng-valkey
    restart: unless-stopped

  searxng-valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: xuemate-searxng-valkey
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - searxng-valkey-data:/data
    restart: unless-stopped

  crawl4ai:
    build:
      context: ./services/crawler/crawl4ai
      dockerfile: Dockerfile
      args:
        INSTALL_TYPE: default
        ENABLE_GPU: "false"
    image: xuemate/crawl4ai-local:latest
    container_name: xuemate-crawl4ai
    ports:
      - "11235:11235"
    environment:
      CRAWL4AI_API_TOKEN: ""
      CRAWL4AI_HOOKS_ENABLED: "false"
    volumes:
      - /dev/shm:/dev/shm
    shm_size: 1gb
    restart: unless-stopped

volumes:
  searxng-data:
  searxng-valkey-data:
